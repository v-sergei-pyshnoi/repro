name: buildx-local-cache-smoke-test

on:
  workflow_dispatch:

jobs:
  attempt-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore buildx cache
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ github.run_id }}-attempt-1
          restore-keys: |
            buildx-${{ github.run_id }}-

      - name: Inspect cache before build
        shell: bash
        run: |
          echo "cache-hit=${{ steps.cache-restore.outputs.cache-hit }}"
          mkdir -p /tmp/.buildx-cache
          echo "=== cache before build ==="
          du -sh /tmp/.buildx-cache || true
          find /tmp/.buildx-cache -maxdepth 2 | sort || true

      - name: Prepare Dockerfile
        shell: bash
        run: |
          cat > Dockerfile <<'EOF'
          FROM ubuntu:24.04
          RUN apt-get update && apt-get install -y curl ca-certificates && rm -rf /var/lib/apt/lists/*
          RUN echo "layer-1" > /marker-1.txt
          EOF

      - name: Build image using local cache
        shell: bash
        run: |
          docker buildx build \
            --progress=plain \
            --tag buildx-cache-test:attempt-1 \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            .

      - name: Finalize cache after build
        shell: bash
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          echo "=== cache after build ==="
          du -sh /tmp/.buildx-cache || true
          find /tmp/.buildx-cache -maxdepth 2 | sort || true

      - name: Save buildx cache
        uses: actions/cache/save@v5
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ github.run_id }}-attempt-1

