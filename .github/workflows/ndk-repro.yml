name: test-setup-ndk

on:
  workflow_dispatch:


jobs:
  ndk-smoke-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, x86_64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Setup NDK
        uses: nttld/setup-ndk@v1.5.0
        id: setup-ndk
        with:
          ndk-version: r27
          link-to-sdk: true
          local-cache: true

      - name: Validate installed NDK
        shell: bash
        run: |
          echo "NDK path: ${{ steps.setup-ndk.outputs.ndk-path }}"
          test -d "${{ steps.setup-ndk.outputs.ndk-path }}"
          test -f "${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake"
          test -f "${{ steps.setup-ndk.outputs.ndk-path }}/source.properties"
          cat "${{ steps.setup-ndk.outputs.ndk-path }}/source.properties"

      - name: Validate SDK symlink
        shell: bash
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"

          if [ -n "$ANDROID_SDK_ROOT" ]; then
            find "$ANDROID_SDK_ROOT/ndk" -maxdepth 2 -mindepth 1 -type d 2>/dev/null || true
          fi

          if [ -n "$ANDROID_HOME" ]; then
            find "$ANDROID_HOME/ndk" -maxdepth 2 -mindepth 1 -type d 2>/dev/null || true
          fi

      - name: Create minimal Android C++ project
        shell: bash
        run: |
          mkdir -p smoke-test
          cat > smoke-test/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(ndk_smoke_test CXX)

          add_library(hello SHARED hello.cpp)
          EOF

          cat > smoke-test/hello.cpp <<'EOF'
          extern "C" int hello() {
            return 42;
          }
          EOF

      - name: Configure with NDK toolchain
        shell: bash
        run: |
          cmake -S smoke-test -B smoke-test/build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="${{ matrix.abi }}" \
            -DANDROID_PLATFORM=android-23

      - name: Build with NDK
        shell: bash
        run: |
          cmake --build smoke-test/build --verbose

      - name: Verify output binary
        shell: bash
        run: |
          find smoke-test/build -name 'libhello.so' | grep .
