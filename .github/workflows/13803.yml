name: Install SDL i386 deps

on:
  workflow_dispatch:

jobs:
  install-deps:
    runs-on: ubuntu-24.04

    steps:
      - name: Set up repository
        uses: actions/checkout@v4
        with:
          show-progress: false
          fetch-depth: 1
      - name: Install and verify SDL i386 dependencies
        run: |

          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev:i386
