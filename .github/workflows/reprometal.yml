name: Repro Metal Toolchain Error

on:
  workflow_dispatch:

jobs:
  repro:
    runs-on: macos-26

    steps:
      - name: Show environment
        run: |
          echo "Developer dir:"
          xcode-select -p || true
          echo
          echo "Xcode version:"
          xcodebuild -version || true
          echo
          echo "macOS version:"
          sw_vers || true

      - name: Check metal tool
        run: |
          echo "Trying to locate metal..."
          xcrun -f metal || true
          echo
          echo "Checking MetalToolchain component..."
          xcodebuild -showComponent MetalToolchain || true

      - name: Create minimal shader
        run: |
          cat > test.metal <<'EOF'
          #include <metal_stdlib>
          using namespace metal;

          kernel void test_kernel(device float* data [[buffer(0)]],
                                  uint id [[thread_position_in_grid]]) {
              data[id] = 1.0;
          }
          EOF
      - name: "Run xcodebuild -downloadComponent MetalToolchain"
        run: xcodebuild -downloadComponent MetalToolchain
      - name: Reproduce missing Metal Toolchain error
        run: |
          xcrun metal -c test.metal -o test.air
