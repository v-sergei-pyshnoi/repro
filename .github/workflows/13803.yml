name: Install SDL i386 deps

on:
  workflow_dispatch:

jobs:
  install-deps:
    runs-on: ubuntu-latest

    steps:
      - name: Install SDL i386 dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev:i386 libsdl2-image-dev:i386
