name: Repro and workaround macOS std::promise link issue

on:
  workflow_dispatch:

jobs:
  repro-workaround:
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create minimal repro source
        shell: bash
        run: |
          cat > test.cpp <<'EOF'
          #include <iostream>
          #include <future>

          int main() {
              std::promise<int> p;
              p.set_value(42);
              std::cout << p.get_future().get() << std::endl;
              return 0;
          }
          EOF

          echo "===== test.cpp ====="
          cat test.cpp

      - name: Print default toolchain info
        shell: bash
        run: |
          echo "===== DEFAULT ENV ====="
          echo "PATH=$PATH"
          echo
          echo "which clang:   $(which clang || true)"
          echo "which clang++: $(which clang++ || true)"
          echo "which cc:      $(which cc || true)"
          echo "which c++:     $(which c++ || true)"
          echo
          echo "===== versions ====="
          clang --version || true
          echo
          clang++ --version || true
          echo
          cc --version || true
          echo
          c++ --version || true
          echo
          echo "===== xcrun ====="
          xcrun --find clang || true
          xcrun --find clang++ || true
          xcrun --sdk macosx --show-sdk-path || true
          echo
          xcodebuild -version || true

      - name: Reproduce failure with default clang++
        id: repro_default
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          echo "===== REPRODUCE WITH DEFAULT clang++ ====="
          clang++ -v test.cpp -std=c++17 -o test-default 2>&1 | tee default-build.log

      - name: Show default repro result
        shell: bash
        run: |
          echo "===== DEFAULT RESULT ====="
          echo "Step outcome: ${{ steps.repro_default.outcome }}"
          echo

          if [ -f test-default ]; then
            echo "Default build unexpectedly succeeded"
            ./test-default || true
          else
            echo "Default build failed as expected"
          fi
          echo
          echo "Last 80 lines of default-build.log:"
          tail -n 80 default-build.log || true

      - name: Apply workaround
        shell: bash
        run: |
          echo "CC=$(xcrun --find clang)" >> "$GITHUB_ENV"
          echo "CXX=$(xcrun --find clang++)" >> "$GITHUB_ENV"
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> "$GITHUB_ENV"

      - name: Print workaround toolchain info
        shell: bash
        run: |
          echo "===== WORKAROUND ENV ====="
          echo "CC=$CC"
          echo "CXX=$CXX"
          echo "SDKROOT=$SDKROOT"
          echo
          "$CC" --version
          echo
          "$CXX" --version
          echo
          xcrun --find clang
          xcrun --find clang++
          xcrun --sdk macosx --show-sdk-path

      - name: Retry build with Apple Clang workaround
        id: repro_workaround
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          echo "===== RETRY WITH APPLE CLANG ====="
          "$CXX" -v test.cpp -std=c++17 -isysroot "$SDKROOT" -o test-workaround 2>&1 | tee workaround-build.log

      - name: Show workaround result
        shell: bash
        run: |
          echo "===== WORKAROUND RESULT ====="
          echo "Step outcome: ${{ steps.repro_workaround.outcome }}"
          echo

          if [ -f test-workaround ]; then
            echo "Workaround build succeeded"
            file ./test-workaround || true
            otool -L ./test-workaround || true
            echo
            echo "===== RUN test-workaround ====="
            ./test-workaround
          else
            echo "Workaround build failed"
          fi
          echo
          echo "Last 80 lines of workaround-build.log:"
          tail -n 80 workaround-build.log || true

      - name: Final summary
        shell: bash
        run: |
          echo "===== FINAL SUMMARY ====="
          echo "Default build outcome:    ${{ steps.repro_default.outcome }}"
          echo "Workaround build outcome: ${{ steps.repro_workaround.outcome }}"
          echo

          if [ -f test-default ]; then
            echo "default: binary produced"
          else
            echo "default: no binary"
          fi

          if [ -f test-workaround ]; then
            echo "workaround: binary produced"
          else
            echo "workaround: no binary"
          fi
