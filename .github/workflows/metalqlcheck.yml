name: check metal after codeql init

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql-build:
    name: CodeQL xcodebuild (Xcode ${{ matrix.xcode }})
    runs-on: macos-26

    strategy:
      fail-fast: false
      matrix:
        xcode:
          - "26.0.1"
          - "26.1.1"
          - "26.2"
          - "26.3"
          - "26.4"

    steps:
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Check metal before CodeQL init
        shell: bash
        run: |
          echo "=== Xcode before CodeQL ==="
          xcodebuild -version
          xcrun -f metal
          xcrun metal -v

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift

      - name: Check metal after CodeQL init
        shell: bash
        run: |
          echo "=== Xcode after CodeQL ==="
          xcodebuild -version
          xcrun -f metal
          xcrun metal -v
